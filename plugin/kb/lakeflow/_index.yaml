schema_version: "1.0"
domain: lakeflow
description: Databricks Lakeflow Declarative Pipelines Knowledge Base
last_validated: "2025-01-19"

structure:
  concepts:
    description: "Explanatory content, < 150 lines each"
    files:
      - path: concepts/core-concepts.md
        purpose: Streaming tables, materialized views, Lakeflow fundamentals
      - path: concepts/getting-started.md
        purpose: Tutorial for first pipeline

  patterns:
    description: "Code-focused patterns, < 200 lines each"
    files:
      - path: patterns/python-decorators.md
        purpose: "@dlt.table, @dlt.view, @dlt.expect decorators"
      - path: patterns/python-streaming.md
        purpose: Streaming patterns, Auto Loader, Medallion
      - path: patterns/sql-tables.md
        purpose: CREATE TABLE statements, TBLPROPERTIES
      - path: patterns/sql-streaming.md
        purpose: STREAM syntax, joins, aggregations
      - path: patterns/cdc-apply-changes.md
        purpose: APPLY CHANGES, SCD Type 1/2
      - path: patterns/cdc-example.md
        purpose: Complete CDC examples (Python/SQL)
      - path: patterns/expectations.md
        purpose: Basic data quality expectations
      - path: patterns/expectations-advanced.md
        purpose: Grouped expectations, common patterns

  reference:
    description: "Comprehensive reference, no line limit"
    files:
      - path: reference/pipeline-configuration.md
        purpose: Pipeline settings, clusters
      - path: reference/serverless-pipelines.md
        purpose: Serverless compute
      - path: reference/materialized-views.md
        purpose: MV optimization
      - path: reference/stateful-processing.md
        purpose: Streaming state, watermarks
      - path: reference/parameters.md
        purpose: Pipeline parameters
      - path: reference/unity-catalog.md
        purpose: UC integration
      - path: reference/limitations.md
        purpose: Known limitations

line_limits:
  quick-reference.md: 100
  concepts/*.md: 150
  patterns/*.md: 200
  reference/*.md: unlimited

agents:
  - name: lakeflow-architect
    primary_files:
      - patterns/
      - concepts/
    use_case: Pipeline design
  - name: lakeflow-expert
    primary_files:
      - all
    use_case: Comprehensive guidance
